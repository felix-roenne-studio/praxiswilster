<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — Felix Rönne Studio</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #111;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding: 60px 24px;
        }

        .card {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 48px;
        }

        .wordmark { display: flex; flex-direction: column; gap: 4px; }
        .wordmark-name {
            font-size: 18px; font-weight: 400;
            color: rgba(255,255,255,0.88);
            letter-spacing: -0.01em; line-height: 1.2;
        }
        .wordmark-sub {
            font-size: 11px; font-weight: 300;
            color: rgba(255,255,255,0.55);
            letter-spacing: 0.12em; text-transform: uppercase;
        }

        .section { display: flex; flex-direction: column; gap: 16px; }

        .section-title {
            font-size: 10px; font-weight: 500;
            letter-spacing: 0.12em; text-transform: uppercase;
            color: rgba(255,255,255,0.4);
        }

        .field-label {
            font-size: 10px; font-weight: 500;
            letter-spacing: 0.12em; text-transform: uppercase;
            color: rgba(255,255,255,0.5);
        }

        .field-input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(255,255,255,0.15);
            border-radius: 0;
            color: rgba(255,255,255,0.88);
            font-family: 'Inter', system-ui, sans-serif;
            font-size: 15px; font-weight: 300;
            padding: 10px 0;
            outline: none;
            letter-spacing: 0.02em;
            transition: border-color 0.2s;
            -webkit-appearance: none;
        }
        .field-input:focus { border-color: rgba(255,255,255,0.45); }
        .field-input::placeholder { color: rgba(255,255,255,0.15); }

        textarea.field-input {
            resize: none;
            min-height: 64px;
            line-height: 1.6;
        }

        .error {
            font-size: 12px; font-weight: 300; font-style: italic;
            color: #f87171; min-height: 16px;
        }

        /* Glass button */
        .btn {
            position: relative;
            align-self: flex-start;
            display: inline-flex;
            align-items: center;
            padding: 10px 22px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-family: 'Inter', system-ui, sans-serif;
            font-size: 13px; font-weight: 400;
            letter-spacing: 0.03em;
            color: rgba(255,255,255,0.88);
            overflow: visible;
            background: linear-gradient(180deg, rgba(255,255,255,0.10) 0%, rgba(255,255,255,0.0) 60%);
            backdrop-filter: blur(6px) saturate(1.4);
            -webkit-backdrop-filter: blur(6px) saturate(1.4);
            box-shadow:
                inset 0 0.5px 0 rgba(255,255,255,0.65),
                0 0 0 0.5px rgba(255,255,255,0.16),
                0 1px 4px rgba(0,0,0,0.18);
            transition: background 0.15s ease, box-shadow 0.15s ease, transform 0.12s cubic-bezier(0.16,1,0.3,1), color 0.15s ease;
        }
        .btn::before {
            content: '';
            position: absolute; inset: -1px;
            border-radius: 13px;
            background: radial-gradient(ellipse 85% 50% at 50% 115%, rgba(140,40,220,0.9) 0%, rgba(100,20,180,0.45) 45%, transparent 68%);
            opacity: 0; z-index: -1; filter: blur(6px);
            transition: opacity 0.06s ease;
        }
        .btn:hover {
            color: #fff;
            background: linear-gradient(180deg, rgba(255,255,255,0.16) 0%, rgba(255,255,255,0.01) 55%);
            box-shadow: inset 0 0.5px 0 rgba(255,255,255,0.75), 0 0 0 0.5px rgba(255,255,255,0.22), 0 2px 8px rgba(0,0,0,0.22);
            transform: translateY(-0.5px);
        }
        .btn:active { transform: scale(0.97) translateY(0.5px); }
        .btn:active::before { opacity: 1; }
        .btn:disabled { opacity: 0.35; cursor: not-allowed; pointer-events: none; }

        /* Divider */
        .divider {
            border: none;
            border-top: 1px solid rgba(255,255,255,0.08);
        }

        /* News items */
        .news-list { display: flex; flex-direction: column; gap: 24px; }

        .news-item {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-bottom: 24px;
            border-bottom: 1px solid rgba(255,255,255,0.07);
            position: relative;
        }
        .news-item:last-child { border-bottom: none; padding-bottom: 0; }

        .news-item-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .delete-btn {
            background: none;
            border: none;
            color: rgba(255,255,255,0.2);
            cursor: pointer;
            font-size: 18px;
            line-height: 1;
            padding: 4px;
            transition: color 0.15s;
            font-family: 'Inter', sans-serif;
        }
        .delete-btn:hover { color: #f87171; }

        .add-btn {
            align-self: flex-start;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: none;
            border: none;
            border-bottom: 1px solid rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.4);
            font-family: 'Inter', system-ui, sans-serif;
            font-size: 13px;
            font-weight: 300;
            letter-spacing: 0.03em;
            padding: 8px 0;
            cursor: pointer;
            transition: color 0.15s, border-color 0.15s;
        }
        .add-btn:hover { color: rgba(255,255,255,0.7); border-color: rgba(255,255,255,0.35); }
        .add-btn-icon { font-size: 16px; line-height: 1; }

        /* Status */
        .status-row {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            font-weight: 300;
            color: rgba(255,255,255,0.4);
        }
        .status-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
            background: rgba(255,255,255,0.2);
        }
        .status-dot.preview { background: #f0a020; box-shadow: 0 0 6px #f0a020; }
        .status-dot.live    { background: #40c080; box-shadow: 0 0 6px #40c080; }

        /* Save feedback */
        .save-feedback {
            font-size: 12px; font-weight: 300; font-style: italic;
            color: rgba(255,255,255,0.4);
            min-height: 16px;
        }
        .save-feedback.ok  { color: #6ee7b7; }
        .save-feedback.err { color: #f87171; }

        .footer {
            font-size: 11px; font-weight: 300;
            color: rgba(255,255,255,0.14);
        }

        /* Views */
        #login-view    { display: flex; flex-direction: column; gap: 48px; }
        #dash-view     { display: none; flex-direction: column; gap: 48px; }
    </style>
</head>
<body>
<div class="card">

    <div class="wordmark">
        <div class="wordmark-name">Felix Rönne</div>
        <div class="wordmark-sub">Studio</div>
    </div>

    <!-- LOGIN -->
    <div id="login-view">
        <div class="section">
            <label class="field-label" for="admin-pw">Passwort</label>
            <input class="field-input" id="admin-pw" type="password" placeholder="••••••••" autocomplete="off">
            <span class="error" id="login-error"></span>
        </div>
        <button class="btn" id="login-btn">Anmelden</button>
    </div>

    <!-- DASHBOARD -->
    <div id="dash-view">

        <!-- Aktuelles -->
        <div class="section">
            <span class="section-title">Aktuelles</span>
            <div class="news-list" id="news-list"></div>
            <button class="add-btn" id="add-btn">
                <span class="add-btn-icon">+</span> Eintrag hinzufügen
            </button>
        </div>

        <div style="display:flex;flex-direction:column;gap:10px">
            <button class="btn" id="save-btn">Speichern</button>
            <span class="save-feedback" id="save-feedback"></span>
        </div>

        <hr class="divider">

        <!-- Go-Live -->
        <div class="section">
            <span class="section-title">Website</span>
            <div class="status-row">
                <div class="status-dot preview" id="status-dot"></div>
                <span id="status-text">Vorschau-Modus — passwortgeschützt</span>
            </div>
            <button class="btn" id="golive-btn">Website live schalten</button>
            <span class="save-feedback" id="golive-feedback"></span>
        </div>

        <div class="footer">© 2026</div>
    </div>

</div>

<script>
    let items = [];
    let adminPw = '';

    // ── Login ──────────────────────────────────────────────
    async function tryLogin() {
        const pw = document.getElementById('admin-pw').value.trim();
        if (!pw) return;

        const res = await fetch('/api/admin-login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ adminPassword: pw }),
        });
        const data = await res.json();

        if (data.ok) {
            adminPw = pw;
            await loadContent();
            document.getElementById('login-view').style.display = 'none';
            document.getElementById('dash-view').style.display = 'flex';
        } else {
            document.getElementById('login-error').textContent = 'Falsches Passwort.';
            document.getElementById('admin-pw').value = '';
        }
    }

    document.getElementById('login-btn').addEventListener('click', tryLogin);
    document.getElementById('admin-pw').addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });

    // ── Load content ───────────────────────────────────────
    async function loadContent() {
        try {
            const res = await fetch('/content.json?v=' + Date.now());
            const data = await res.json();
            items = data.aktuelles || [];
            renderList();
        } catch(e) { items = []; renderList(); }
    }

    // ── Render ─────────────────────────────────────────────
    function renderList() {
        const list = document.getElementById('news-list');
        list.innerHTML = '';
        if (items.length === 0) {
            list.innerHTML = '<span style="font-size:13px;font-weight:300;color:rgba(255,255,255,0.25);font-style:italic">Noch keine Einträge.</span>';
            return;
        }
        items.forEach((item, i) => {
            const el = document.createElement('div');
            el.className = 'news-item';
            el.innerHTML = `
                <div class="news-item-header">
                    <span class="field-label">Eintrag ${i + 1}</span>
                    <button class="delete-btn" data-i="${i}" title="Löschen">×</button>
                </div>
                <input class="field-input" data-i="${i}" data-field="title"
                       value="${escHtml(item.title || '')}" placeholder="Titel">
                <textarea class="field-input" data-i="${i}" data-field="text"
                          placeholder="Text (optional)">${escHtml(item.text || '')}</textarea>
            `;
            list.appendChild(el);
        });

        list.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                items.splice(parseInt(btn.dataset.i), 1);
                renderList();
            });
        });
        list.querySelectorAll('[data-field]').forEach(el => {
            el.addEventListener('input', () => {
                items[parseInt(el.dataset.i)][el.dataset.field] = el.value;
            });
        });
    }

    // ── Add ────────────────────────────────────────────────
    document.getElementById('add-btn').addEventListener('click', () => {
        items.push({ title: '', text: '' });
        renderList();
        const inputs = document.querySelectorAll('#news-list .field-input');
        if (inputs.length) inputs[inputs.length - 2]?.focus();
    });

    // ── Save ───────────────────────────────────────────────
    document.getElementById('save-btn').addEventListener('click', async () => {
        const btn = document.getElementById('save-btn');
        const fb  = document.getElementById('save-feedback');
        btn.disabled = true;
        fb.textContent = 'Wird gespeichert …';
        fb.className = 'save-feedback';

        // Sync textarea values (not firing input events)
        document.querySelectorAll('#news-list [data-field]').forEach(el => {
            items[parseInt(el.dataset.i)][el.dataset.field] = el.value;
        });

        try {
            const res = await fetch('/api/save-content', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ adminPassword: adminPw, aktuelles: items }),
            });
            const data = await res.json();
            if (data.ok) {
                fb.textContent = 'Gespeichert. Website wird in ~20s aktualisiert.';
                fb.className = 'save-feedback ok';
            } else {
                fb.textContent = 'Fehler: ' + (data.error || 'Unbekannt');
                fb.className = 'save-feedback err';
            }
        } catch(e) {
            fb.textContent = 'Verbindungsfehler.';
            fb.className = 'save-feedback err';
        }
        btn.disabled = false;
    });

    // ── Go Live ────────────────────────────────────────────
    document.getElementById('golive-btn').addEventListener('click', async () => {
        if (!confirm('Passwortschutz entfernen und Website live schalten?')) return;
        const btn = document.getElementById('golive-btn');
        const fb  = document.getElementById('golive-feedback');
        btn.disabled = true;
        fb.textContent = 'Deployment läuft …';
        fb.className = 'save-feedback';

        try {
            const res = await fetch('/api/admin', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'go-live', adminPassword: adminPw }),
            });
            const data = await res.json();
            if (data.ok) {
                document.getElementById('status-dot').className = 'status-dot live';
                document.getElementById('status-text').textContent = 'Live — öffentlich zugänglich';
                btn.style.display = 'none';
                fb.textContent = 'Website ist jetzt live.';
                fb.className = 'save-feedback ok';
            } else {
                fb.textContent = 'Fehler beim Deployment.';
                fb.className = 'save-feedback err';
                btn.disabled = false;
            }
        } catch(e) {
            fb.textContent = 'Verbindungsfehler.';
            fb.className = 'save-feedback err';
            btn.disabled = false;
        }
    });

    function escHtml(s) {
        return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
</script>
</body>
</html>
