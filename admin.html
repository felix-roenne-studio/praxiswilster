<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — Felix Rönne Studio</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #F5F5F7;
            color: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding: 48px 20px 80px;
        }

        .card {
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Wordmark */
        .wordmark {
            display: flex; flex-direction: column; gap: 2px;
            padding: 0 4px 8px;
        }
        .wordmark-name {
            font-size: 16px; font-weight: 500;
            color: #1a1a1a;
            letter-spacing: -0.01em; line-height: 1.2;
        }
        .wordmark-sub {
            font-size: 10px; font-weight: 400;
            color: #999;
            letter-spacing: 0.1em; text-transform: uppercase;
        }

        /* Section card */
        .section {
            background: #fff;
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            box-shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
        }

        .section-title {
            font-size: 11px; font-weight: 600;
            letter-spacing: 0.08em; text-transform: uppercase;
            color: #999;
        }

        .field-label {
            font-size: 11px; font-weight: 500;
            letter-spacing: 0.06em; text-transform: uppercase;
            color: #888;
        }

        .field-input {
            width: 100%;
            background: #F5F5F7;
            border: 1.5px solid #E5E5E7;
            border-radius: 10px;
            color: #1a1a1a;
            font-family: 'Inter', system-ui, sans-serif;
            font-size: 15px; font-weight: 400;
            padding: 11px 14px;
            outline: none;
            transition: border-color 0.15s;
            -webkit-appearance: none;
        }
        .field-input:focus { border-color: #1a1a1a; background: #fff; }
        .field-input::placeholder { color: #bbb; }

        textarea.field-input {
            resize: none;
            min-height: 72px;
            line-height: 1.6;
        }

        .error {
            font-size: 12px; font-weight: 400;
            color: #dc2626; min-height: 16px;
        }

        /* Primary button */
        .btn {
            align-self: flex-start;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 12px 22px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-family: 'Inter', system-ui, sans-serif;
            font-size: 14px; font-weight: 500;
            color: #fff;
            background: #1a1a1a;
            box-shadow: 0 1px 3px rgba(0,0,0,.15);
            transition: background 0.15s, transform 0.1s;
        }
        .btn:hover  { background: #333; }
        .btn:active { transform: scale(0.97); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; pointer-events: none; }

        /* Divider */
        .divider { display: none; }

        /* News items */
        .news-list { display: flex; flex-direction: column; gap: 16px; }

        .news-item {
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #F5F5F7;
            border-radius: 12px;
            padding: 14px;
        }

        .news-item-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .delete-btn {
            background: none;
            border: none;
            color: #ccc;
            cursor: pointer;
            font-size: 20px;
            line-height: 1;
            padding: 2px 4px;
            transition: color 0.15s;
            font-family: 'Inter', sans-serif;
            min-width: 32px; min-height: 32px;
            display: flex; align-items: center; justify-content: center;
        }
        .delete-btn:hover { color: #dc2626; }

        .add-btn {
            align-self: flex-start;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #F5F5F7;
            border: 1.5px dashed #D1D1D6;
            border-radius: 10px;
            color: #888;
            font-family: 'Inter', system-ui, sans-serif;
            font-size: 13px;
            font-weight: 400;
            padding: 9px 14px;
            cursor: pointer;
            width: 100%;
            justify-content: center;
            transition: border-color 0.15s, color 0.15s, background 0.15s;
        }
        .add-btn:hover { border-color: #1a1a1a; color: #1a1a1a; background: #f0f0f0; }
        .add-btn-icon { font-size: 16px; line-height: 1; }

        /* Toggle */
        .toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            background: #F5F5F7;
            border-radius: 12px;
            padding: 14px;
        }
        .toggle-label {
            font-size: 14px; font-weight: 400;
            color: #333;
            line-height: 1.4;
        }
        .toggle {
            position: relative;
            width: 44px; height: 26px;
            flex-shrink: 0;
        }
        .toggle input { opacity: 0; width: 0; height: 0; }
        .toggle-track {
            position: absolute; inset: 0;
            background: #D1D1D6;
            border-radius: 13px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .toggle-track::after {
            content: '';
            position: absolute;
            top: 3px; left: 3px;
            width: 20px; height: 20px;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 1px 3px rgba(0,0,0,.2);
            transition: transform 0.2s;
        }
        .toggle input:checked + .toggle-track { background: #1a1a1a; }
        .toggle input:checked + .toggle-track::after { transform: translateX(18px); }

        .date-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .date-field { display: flex; flex-direction: column; gap: 6px; }

        /* Status */
        .status-row {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            font-weight: 400;
            color: #666;
        }
        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
            background: #D1D1D6;
        }
        .status-dot.preview { background: #f0a020; box-shadow: 0 0 6px #f0a020; }
        .status-dot.live    { background: #16a34a; box-shadow: 0 0 6px #16a34a; }

        /* Save feedback */
        .save-feedback {
            font-size: 13px; font-weight: 400;
            color: #999;
            min-height: 18px;
            padding: 0 4px;
        }
        .save-feedback.ok  { color: #16a34a; }
        .save-feedback.err { color: #dc2626; }

        .footer {
            font-size: 11px; font-weight: 400;
            color: #bbb;
            padding: 0 4px;
        }

        /* Views */
        #login-view    { display: flex; flex-direction: column; gap: 12px; }
        #dash-view     { display: none; flex-direction: column; gap: 12px; }
    </style>
</head>
<body>
<div class="card">

    <div class="wordmark">
        <div class="wordmark-name">Felix Rönne</div>
        <div class="wordmark-sub">Studio</div>
    </div>

    <!-- LOGIN -->
    <div id="login-view">
        <div class="section">
            <label class="field-label" for="admin-pw">Passwort</label>
            <input class="field-input" id="admin-pw" type="password" placeholder="••••••••" autocomplete="off">
            <span class="error" id="login-error"></span>
        </div>
        <button class="btn" id="login-btn">Anmelden</button>
    </div>

    <!-- DASHBOARD -->
    <div id="dash-view">

        <!-- Urlaub -->
        <div class="section">
            <span class="section-title">Urlaub</span>
            <div class="toggle-row">
                <span class="toggle-label">Urlaubshinweis auf Website anzeigen</span>
                <label class="toggle">
                    <input type="checkbox" id="urlaub-aktiv">
                    <span class="toggle-track"></span>
                </label>
            </div>
            <div class="date-row">
                <div class="date-field">
                    <label class="field-label" for="urlaub-von">Von</label>
                    <input class="field-input" type="date" id="urlaub-von">
                </div>
                <div class="date-field">
                    <label class="field-label" for="urlaub-bis">Bis</label>
                    <input class="field-input" type="date" id="urlaub-bis">
                </div>
            </div>
            <label class="field-label" for="urlaub-nachricht">Nachricht (optional)</label>
            <textarea class="field-input" id="urlaub-nachricht" placeholder="z.B. Ab dem 12. August sind wir wieder für Sie da." style="min-height:56px;resize:none"></textarea>
        </div>

        <hr class="divider">

        <!-- Aktuelles -->
        <div class="section">
            <span class="section-title">Aktuelles</span>
            <div class="news-list" id="news-list"></div>
            <button class="add-btn" id="add-btn">
                <span class="add-btn-icon">+</span> Eintrag hinzufügen
            </button>
        </div>

        <div style="display:flex;flex-direction:column;gap:10px">
            <button class="btn" id="save-btn">Speichern</button>
            <span class="save-feedback" id="save-feedback"></span>
        </div>

        <hr class="divider">

        <!-- Go-Live -->
        <div class="section">
            <span class="section-title">Website</span>
            <div class="status-row">
                <div class="status-dot preview" id="status-dot"></div>
                <span id="status-text">Vorschau-Modus — passwortgeschützt</span>
            </div>
            <button class="btn" id="golive-btn">Website live schalten</button>
            <span class="save-feedback" id="golive-feedback"></span>
        </div>

        <div class="footer">© 2026</div>
    </div>

</div>

<script>
    let items = [];
    let adminPw = '';

    // ── Login ──────────────────────────────────────────────
    async function tryLogin() {
        const pw = document.getElementById('admin-pw').value.trim();
        if (!pw) return;

        const res = await fetch('/api/admin-login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ adminPassword: pw }),
        });
        const data = await res.json();

        if (data.ok) {
            adminPw = pw;
            await loadContent();
            document.getElementById('login-view').style.display = 'none';
            document.getElementById('dash-view').style.display = 'flex';
        } else {
            document.getElementById('login-error').textContent = 'Falsches Passwort.';
            document.getElementById('admin-pw').value = '';
        }
    }

    document.getElementById('login-btn').addEventListener('click', tryLogin);
    document.getElementById('admin-pw').addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });

    // ── Load content ───────────────────────────────────────
    async function loadContent() {
        try {
            const res = await fetch('/content.json?v=' + Date.now());
            const data = await res.json();
            items = data.aktuelles || [];
            renderList();
            // Urlaub
            const u = data.urlaub || {};
            document.getElementById('urlaub-aktiv').checked   = !!u.aktiv;
            document.getElementById('urlaub-von').value       = u.von || '';
            document.getElementById('urlaub-bis').value       = u.bis || '';
            document.getElementById('urlaub-nachricht').value = u.nachricht || '';
        } catch(e) { items = []; renderList(); }
    }

    // ── Render ─────────────────────────────────────────────
    function renderList() {
        const list = document.getElementById('news-list');
        list.innerHTML = '';
        if (items.length === 0) {
            list.innerHTML = '<span style="font-size:13px;font-weight:300;color:rgba(255,255,255,0.25);font-style:italic">Noch keine Einträge.</span>';
            return;
        }
        items.forEach((item, i) => {
            const el = document.createElement('div');
            el.className = 'news-item';
            el.innerHTML = `
                <div class="news-item-header">
                    <span class="field-label">Eintrag ${i + 1}</span>
                    <button class="delete-btn" data-i="${i}" title="Löschen">×</button>
                </div>
                <input class="field-input" data-i="${i}" data-field="title"
                       value="${escHtml(item.title || '')}" placeholder="Titel">
                <textarea class="field-input" data-i="${i}" data-field="text"
                          placeholder="Text (optional)">${escHtml(item.text || '')}</textarea>
            `;
            list.appendChild(el);
        });

        list.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                items.splice(parseInt(btn.dataset.i), 1);
                renderList();
            });
        });
        list.querySelectorAll('[data-field]').forEach(el => {
            el.addEventListener('input', () => {
                items[parseInt(el.dataset.i)][el.dataset.field] = el.value;
            });
        });
    }

    // ── Add ────────────────────────────────────────────────
    document.getElementById('add-btn').addEventListener('click', () => {
        items.push({ title: '', text: '' });
        renderList();
        const inputs = document.querySelectorAll('#news-list .field-input');
        if (inputs.length) inputs[inputs.length - 2]?.focus();
    });

    // ── Save ───────────────────────────────────────────────
    document.getElementById('save-btn').addEventListener('click', async () => {
        const btn = document.getElementById('save-btn');
        const fb  = document.getElementById('save-feedback');
        btn.disabled = true;
        fb.textContent = 'Wird gespeichert …';
        fb.className = 'save-feedback';

        // Sync textarea values (not firing input events)
        document.querySelectorAll('#news-list [data-field]').forEach(el => {
            items[parseInt(el.dataset.i)][el.dataset.field] = el.value;
        });

        try {
            const res = await fetch('/api/save-content', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    adminPassword: adminPw,
                    aktuelles: items,
                    urlaub: {
                        aktiv:     document.getElementById('urlaub-aktiv').checked,
                        von:       document.getElementById('urlaub-von').value,
                        bis:       document.getElementById('urlaub-bis').value,
                        nachricht: document.getElementById('urlaub-nachricht').value.trim(),
                    },
                }),
            });
            const data = await res.json();
            if (data.ok) {
                fb.textContent = 'Gespeichert. Website wird in ~20s aktualisiert.';
                fb.className = 'save-feedback ok';
            } else {
                fb.textContent = 'Fehler: ' + (data.error || 'Unbekannt');
                fb.className = 'save-feedback err';
            }
        } catch(e) {
            fb.textContent = 'Verbindungsfehler.';
            fb.className = 'save-feedback err';
        }
        btn.disabled = false;
    });

    // ── Go Live ────────────────────────────────────────────
    document.getElementById('golive-btn').addEventListener('click', async () => {
        if (!confirm('Passwortschutz entfernen und Website live schalten?')) return;
        const btn = document.getElementById('golive-btn');
        const fb  = document.getElementById('golive-feedback');
        btn.disabled = true;
        fb.textContent = 'Deployment läuft …';
        fb.className = 'save-feedback';

        try {
            const res = await fetch('/api/admin', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'go-live', adminPassword: adminPw }),
            });
            const data = await res.json();
            if (data.ok) {
                document.getElementById('status-dot').className = 'status-dot live';
                document.getElementById('status-text').textContent = 'Live — öffentlich zugänglich';
                btn.style.display = 'none';
                fb.textContent = 'Website ist jetzt live.';
                fb.className = 'save-feedback ok';
            } else {
                fb.textContent = 'Fehler beim Deployment.';
                fb.className = 'save-feedback err';
                btn.disabled = false;
            }
        } catch(e) {
            fb.textContent = 'Verbindungsfehler.';
            fb.className = 'save-feedback err';
            btn.disabled = false;
        }
    });

    function escHtml(s) {
        return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
</script>
</body>
</html>
